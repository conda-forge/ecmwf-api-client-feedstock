{% set name = "ecmwf-api-client" %}
{% set version = "1.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 1971a047c01cc50cfc893f13fdfa710cf56fb872f1c04685b13c6f1d18431164

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - ecmwfapi

about:
  home: https://software.ecmwf.int/wiki/display/WEBAPI
  license: Apache-2.0
  license_file: LICENSE
  summary: Python client for ECMWF web services API.

extra:
  recipe-maintainers:
    - Ohjeah
    - avalentino
